<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-labelledby="title desc">
  <title id="title">SW SAM.gov Auto Searcher workflow schematic</title>
  <desc id="desc">A simplified six-column workflow schematic for SW SAM.gov Auto Searcher. It shows source collection, normalization, local stores, analysis tools, operator surfaces, and decision outputs as grouped stages.</desc>
  <defs>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 760 32px "Segoe UI", Arial, sans-serif; fill: #102033; }
      .subtitle { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #506070; }
      .column { fill: #ffffff; stroke: #d6dee9; stroke-width: 2; }
      .columnTitle { font: 760 17px "Segoe UI", Arial, sans-serif; fill: #1f2d44; }
      .columnSub { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .stepNum { font: 760 13px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .cardTitle { font: 730 14px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .cardSub { font: 400 11.5px "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .noteTitle { font: 760 13px "Segoe UI", Arial, sans-serif; fill: #253247; }
      .noteText { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #4f5f73; }
      .pillText { font: 700 11px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .source { fill: #e8f2ff; stroke: #4f8edb; }
      .engine { fill: #ecfdf5; stroke: #17a36b; }
      .store { fill: #fff7ed; stroke: #f08a24; }
      .surface { fill: #eef2ff; stroke: #6366f1; }
      .out { fill: #fdf2f8; stroke: #db4f92; }
      .guide { fill: #f8fafc; stroke: #94a3b8; }
      .band { fill: #102033; }
      .bandText { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #e5eefb; }
      .shadow { filter: url(#shadow); }
    </style>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="122%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
  </defs>

  <rect class="page" width="1500" height="820"/>
  <text class="title" x="40" y="52">SW SAM.gov Auto Searcher - workflow at a glance</text>
  <text class="subtitle" x="40" y="78">Read left to right. Each column is a stage; cards inside the column are the main moving parts.</text>

  <rect class="band shadow" x="40" y="104" width="1420" height="54" rx="12"/>
  <text class="bandText" x="64" y="136">Goal: find realistic small-team field-installation opportunities, inspect public attachments, ground the go/no-go call in evidence, and prepare pursuit or subcontractor follow-up.</text>

  <!-- Columns -->
  <rect class="column shadow" x="40" y="188" width="210" height="450" rx="16"/>
  <rect class="column shadow" x="270" y="188" width="210" height="450" rx="16"/>
  <rect class="column shadow" x="500" y="188" width="210" height="450" rx="16"/>
  <rect class="column shadow" x="730" y="188" width="210" height="450" rx="16"/>
  <rect class="column shadow" x="960" y="188" width="210" height="450" rx="16"/>
  <rect class="column shadow" x="1190" y="188" width="270" height="450" rx="16"/>

  <!-- Column headers -->
  <circle cx="66" cy="216" r="14" fill="#1f2d44"/><text class="stepNum" x="66" y="221" text-anchor="middle">1</text>
  <text class="columnTitle" x="92" y="214">Acquire</text>
  <text class="columnSub" x="92" y="234">public market inputs</text>

  <circle cx="296" cy="216" r="14" fill="#1f2d44"/><text class="stepNum" x="296" y="221" text-anchor="middle">2</text>
  <text class="columnTitle" x="322" y="214">Normalize</text>
  <text class="columnSub" x="322" y="234">download, convert, cache</text>

  <circle cx="526" cy="216" r="14" fill="#1f2d44"/><text class="stepNum" x="526" y="221" text-anchor="middle">3</text>
  <text class="columnTitle" x="552" y="214">Store</text>
  <text class="columnSub" x="552" y="234">local working memory</text>

  <circle cx="756" cy="216" r="14" fill="#1f2d44"/><text class="stepNum" x="756" y="221" text-anchor="middle">4</text>
  <text class="columnTitle" x="782" y="214">Analyze</text>
  <text class="columnSub" x="782" y="234">fit, risk, evidence</text>

  <circle cx="986" cy="216" r="14" fill="#1f2d44"/><text class="stepNum" x="986" y="221" text-anchor="middle">5</text>
  <text class="columnTitle" x="1012" y="214">Operate</text>
  <text class="columnSub" x="1012" y="234">human and AI surfaces</text>

  <circle cx="1216" cy="216" r="14" fill="#1f2d44"/><text class="stepNum" x="1216" y="221" text-anchor="middle">6</text>
  <text class="columnTitle" x="1242" y="214">Decide</text>
  <text class="columnSub" x="1242" y="234">pursuit outputs</text>

  <!-- Acquire cards -->
  <rect class="source" x="62" y="266" width="166" height="52" rx="10"/><text class="cardTitle" x="78" y="289">SAM.gov extract</text><text class="cardSub" x="78" y="306">daily opportunity CSV</text>
  <rect class="source" x="62" y="332" width="166" height="52" rx="10"/><text class="cardTitle" x="78" y="355">SAM.gov live API</text><text class="cardSub" x="78" y="372">same-day lookup</text>
  <rect class="source" x="62" y="398" width="166" height="52" rx="10"/><text class="cardTitle" x="78" y="421">Public attachments</text><text class="cardSub" x="78" y="438">SOW, PWS, RFQ files</text>
  <rect class="source" x="62" y="464" width="166" height="52" rx="10"/><text class="cardTitle" x="78" y="487">USAspending</text><text class="cardSub" x="78" y="504">incumbent context</text>
  <rect class="source" x="62" y="530" width="166" height="52" rx="10"/><text class="cardTitle" x="78" y="553">Google Places</text><text class="cardSub" x="78" y="570">local subs/vendors</text>

  <!-- Normalize cards -->
  <rect class="engine" x="292" y="266" width="166" height="58" rx="10"/><text class="cardTitle" x="308" y="290">sync_bulk.py</text><text class="cardSub" x="308" y="307">refresh SAM mirror</text>
  <rect class="engine" x="292" y="344" width="166" height="72" rx="10"/><text class="cardTitle" x="308" y="368">document_store.py</text><text class="cardSub" x="308" y="385">download attachment</text><text class="cardSub" x="308" y="402">convert PDF to Markdown</text>
  <rect class="engine" x="292" y="436" width="166" height="58" rx="10"/><text class="cardTitle" x="308" y="460">source_vendors.py</text><text class="cardSub" x="308" y="477">build call script</text>
  <rect class="engine" x="292" y="514" width="166" height="58" rx="10"/><text class="cardTitle" x="308" y="538">API helpers</text><text class="cardSub" x="308" y="555">awards and clauses</text>

  <!-- Store cards -->
  <rect class="store" x="522" y="266" width="166" height="52" rx="10"/><text class="cardTitle" x="538" y="289">contracts.db</text><text class="cardSub" x="538" y="306">opportunity mirror</text>
  <rect class="store" x="522" y="332" width="166" height="52" rx="10"/><text class="cardTitle" x="538" y="355">Elasticsearch</text><text class="cardSub" x="538" y="372">document evidence</text>
  <rect class="store" x="522" y="398" width="166" height="52" rx="10"/><text class="cardTitle" x="538" y="421">Markdown cache</text><text class="cardSub" x="538" y="438">inspectable .md files</text>
  <rect class="store" x="522" y="464" width="166" height="52" rx="10"/><text class="cardTitle" x="538" y="487">watchlist.db</text><text class="cardSub" x="538" y="504">pursuits and scans</text>
  <rect class="store" x="522" y="530" width="166" height="52" rx="10"/><text class="cardTitle" x="538" y="553">Job stores</text><text class="cardSub" x="538" y="570">panel and vendor queues</text>

  <!-- Analyze cards -->
  <rect class="engine" x="752" y="266" width="166" height="52" rx="10"/><text class="cardTitle" x="768" y="289">Search + score</text><text class="cardSub" x="768" y="306">fit rubric and gates</text>
  <rect class="engine" x="752" y="332" width="166" height="52" rx="10"/><text class="cardTitle" x="768" y="355">Document search</text><text class="cardSub" x="768" y="372">scope and blockers</text>
  <rect class="engine" x="752" y="398" width="166" height="52" rx="10"/><text class="cardTitle" x="768" y="421">Panel review</text><text class="cardSub" x="768" y="438">eligibility, fit, red team</text>
  <rect class="engine" x="752" y="464" width="166" height="52" rx="10"/><text class="cardTitle" x="768" y="487">Sub path finder</text><text class="cardSub" x="768" y="504">prime plus local crew</text>
  <rect class="engine" x="752" y="530" width="166" height="52" rx="10"/><text class="cardTitle" x="768" y="553">Daily digest</text><text class="cardSub" x="768" y="570">ranked report</text>

  <!-- Operate cards -->
  <rect class="surface" x="982" y="266" width="166" height="66" rx="10"/><text class="cardTitle" x="998" y="290">Workbench</text><text class="cardSub" x="998" y="307">phone-friendly dashboard</text><text class="cardSub" x="998" y="324">leads, scans, pursuits</text>
  <rect class="surface" x="982" y="352" width="166" height="66" rx="10"/><text class="cardTitle" x="998" y="376">MCP server</text><text class="cardSub" x="998" y="393">tools for Codex/Claude</text><text class="cardSub" x="998" y="410">search, ingest, publish</text>
  <rect class="surface" x="982" y="438" width="166" height="66" rx="10"/><text class="cardTitle" x="998" y="462">CLI</text><text class="cardSub" x="998" y="479">swcb command runner</text><text class="cardSub" x="998" y="496">scripts stay usable</text>
  <rect class="surface" x="982" y="524" width="166" height="58" rx="10"/><text class="cardTitle" x="998" y="548">Prompt library</text><text class="cardSub" x="998" y="565">repeatable agent tasks</text>

  <!-- Decide cards -->
  <rect class="out" x="1212" y="266" width="226" height="52" rx="10"/><text class="cardTitle" x="1228" y="289">Assess now / monitor / reject</text><text class="cardSub" x="1228" y="306">final scan card in Workbench</text>
  <rect class="out" x="1212" y="332" width="226" height="52" rx="10"/><text class="cardTitle" x="1228" y="355">Panel verdict</text><text class="cardSub" x="1228" y="372">evidence-grounded go/no-go</text>
  <rect class="out" x="1212" y="398" width="226" height="52" rx="10"/><text class="cardTitle" x="1228" y="421">Vendor package</text><text class="cardSub" x="1228" y="438">subs, call script, email ask-list</text>
  <rect class="out" x="1212" y="464" width="226" height="52" rx="10"/><text class="cardTitle" x="1228" y="487">Document evidence</text><text class="cardSub" x="1228" y="504">quotes backed by public files</text>
  <rect class="out" x="1212" y="530" width="226" height="52" rx="10"/><text class="cardTitle" x="1228" y="553">Bid/no-bid next step</text><text class="cardSub" x="1228" y="570">task and pursuit state updated</text>

  <!-- Bottom guidance strip -->
  <rect class="guide shadow" x="40" y="674" width="1420" height="96" rx="16"/>
  <text class="noteTitle" x="64" y="704">Rules that guide every stage</text>
  <text class="noteText" x="64" y="728">PROFILE.md keeps the business fit focused: small-team field installation, DMV-first, total small business now, SDVOSB later.</text>
  <text class="noteText" x="64" y="750">criteria/ holds fit, exclusion, panel, resale, and vendor-sourcing rules. tasks/ records setup work and next operating steps.</text>

  <rect class="guide" x="1010" y="700" width="116" height="30" rx="15"/><text class="pillText" x="1068" y="720" text-anchor="middle">PROFILE.md</text>
  <rect class="guide" x="1140" y="700" width="116" height="30" rx="15"/><text class="pillText" x="1198" y="720" text-anchor="middle">criteria/</text>
  <rect class="guide" x="1270" y="700" width="92" height="30" rx="15"/><text class="pillText" x="1316" y="720" text-anchor="middle">tasks/</text>
  <rect class="guide" x="1010" y="740" width="160" height="30" rx="15"/><text class="pillText" x="1090" y="760" text-anchor="middle">adapters/skills/</text>
  <rect class="guide" x="1184" y="740" width="116" height="30" rx="15"/><text class="pillText" x="1242" y="760" text-anchor="middle">prompts/</text>
</svg>
