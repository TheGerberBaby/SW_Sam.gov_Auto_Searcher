<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="800" viewBox="0 0 1300 800" role="img" aria-labelledby="title desc">
  <title id="title">SW SAM.gov Auto Searcher system schematic</title>
  <desc id="desc">Box and arrow schematic: public SAM.gov, USAspending, and eCFR sources feed local Python scripts (sync, search, document index, scoring, digest, watchlist) into SQLite, Elasticsearch, and a watchlist store, surfaced through a single-page operator dashboard and an MCP server for Codex and Claude, producing digests, a pursuit tracker, and evidence-backed research decisions.</desc>
  <defs>
    <style>
      .page { fill: #f7fafc; }
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #102033; }
      .subtitle { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #506070; }
      .lane { fill: #ffffff; stroke: #d5dde8; stroke-width: 2; }
      .laneTitle { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #223044; letter-spacing: .2px; }
      .box { stroke-width: 2; }
      .boxText { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .boxSub { font: 400 11.5px "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 11px "Segoe UI", Arial, sans-serif; fill: #415168; }
      .small { font: 400 11px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .arrow { fill: none; stroke: #314866; stroke-width: 2.4; marker-end: url(#arrowHead); }
      .softArrow { fill: none; stroke: #8b5cf6; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrowHeadSoft); }
      .source { fill: #e8f2ff; stroke: #4f8edb; }
      .engine { fill: #ecfdf5; stroke: #17a36b; }
      .store { fill: #fff7ed; stroke: #f08a24; }
      .surface { fill: #eef2ff; stroke: #6366f1; }
      .out { fill: #fdf2f8; stroke: #db4f92; }
      .guide { fill: #f8fafc; stroke: #94a3b8; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#314866"/>
    </marker>
    <marker id="arrowHeadSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8b5cf6"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
  </defs>

  <rect class="page" width="1300" height="800"/>
  <text class="title" x="40" y="54">SW SAM.gov Auto Searcher</text>
  <text class="subtitle" x="40" y="82">Discovery + document evidence + deterministic scoring + single-page operator dashboard + AI research</text>

  <!-- inter-lane flow labels -->
  <text class="label" x="272" y="106" text-anchor="middle">ingest / fetch</text>
  <text class="label" x="524" y="106" text-anchor="middle">write</text>
  <text class="label" x="776" y="106" text-anchor="middle">read</text>
  <text class="label" x="1028" y="106" text-anchor="middle">produce</text>

  <!-- ===== Public Sources ===== -->
  <rect class="lane" x="34" y="116" width="224" height="524" rx="18" filter="url(#shadow)"/>
  <text class="laneTitle" x="58" y="148">Public Sources</text>

  <rect class="box source" x="56" y="174" width="180" height="72" rx="13"/>
  <text class="boxText" x="74" y="202">SAM.gov Extract</text>
  <text class="boxSub" x="74" y="222">daily public CSV</text>

  <rect class="box source" x="56" y="258" width="180" height="72" rx="13"/>
  <text class="boxText" x="74" y="286">SAM.gov API</text>
  <text class="boxSub" x="74" y="306">live fallback search</text>

  <rect class="box source" x="56" y="342" width="180" height="72" rx="13"/>
  <text class="boxText" x="74" y="370">Solicitation Files</text>
  <text class="boxSub" x="74" y="390">PDF · DOCX · HTML</text>

  <rect class="box source" x="56" y="426" width="180" height="72" rx="13"/>
  <text class="boxText" x="74" y="454">USAspending API</text>
  <text class="boxSub" x="74" y="474">federal award history</text>

  <rect class="box source" x="56" y="510" width="180" height="72" rx="13"/>
  <text class="boxText" x="74" y="538">eCFR API</text>
  <text class="boxSub" x="74" y="558">FAR &amp; CFR clauses</text>

  <!-- ===== Local Engine ===== -->
  <rect class="lane" x="286" y="116" width="224" height="524" rx="18" filter="url(#shadow)"/>
  <text class="laneTitle" x="310" y="148">Local Engine (Python)</text>

  <rect class="box engine" x="308" y="170" width="180" height="64" rx="13"/>
  <text class="boxText" x="326" y="196">sync_bulk.py</text>
  <text class="boxSub" x="326" y="216">download &amp; normalize</text>

  <rect class="box engine" x="308" y="246" width="180" height="64" rx="13"/>
  <text class="boxText" x="326" y="272">search_bulk.py</text>
  <text class="boxSub" x="326" y="292">+ find_contracts.py (live)</text>

  <rect class="box engine" x="308" y="322" width="180" height="64" rx="13"/>
  <text class="boxText" x="326" y="348">document_store.py</text>
  <text class="boxSub" x="326" y="368">extract · chunk · index</text>

  <rect class="box engine" x="308" y="398" width="180" height="64" rx="13"/>
  <text class="boxText" x="326" y="424">scoring.py</text>
  <text class="boxSub" x="326" y="444">deterministic lead rubric</text>

  <rect class="box engine" x="308" y="474" width="180" height="64" rx="13"/>
  <text class="boxText" x="326" y="500">digest + watchlist</text>
  <text class="boxSub" x="326" y="520">ranked report + pursuits</text>

  <rect class="box engine" x="308" y="550" width="180" height="64" rx="13"/>
  <text class="boxText" x="326" y="576">usaspending · ecfr</text>
  <text class="boxSub" x="326" y="596">incumbents + clauses</text>

  <!-- ===== Local Storage ===== -->
  <rect class="lane" x="538" y="116" width="224" height="524" rx="18" filter="url(#shadow)"/>
  <text class="laneTitle" x="562" y="148">Local Storage</text>

  <rect class="box store" x="560" y="174" width="180" height="80" rx="13"/>
  <text class="boxText" x="578" y="202">SQLite Mirror</text>
  <text class="boxSub" x="578" y="222">data/contracts.db</text>
  <text class="boxSub" x="578" y="240">structured opportunities</text>

  <rect class="box store" x="560" y="282" width="180" height="80" rx="13"/>
  <text class="boxText" x="578" y="310">Elasticsearch</text>
  <text class="boxSub" x="578" y="330">stormwind_documents_v1</text>
  <text class="boxSub" x="578" y="348">evidence chunks</text>

  <rect class="box store" x="560" y="390" width="180" height="80" rx="13"/>
  <text class="boxText" x="578" y="418">Watchlist DB</text>
  <text class="boxSub" x="578" y="438">data/watchlist.db</text>
  <text class="boxSub" x="578" y="456">pursuits + fit scores</text>

  <rect class="box store" x="560" y="498" width="180" height="80" rx="13"/>
  <text class="boxText" x="578" y="526">API caches</text>
  <text class="boxSub" x="578" y="546">usaspending + eCFR</text>
  <text class="boxSub" x="578" y="564">refreshed on demand</text>

  <!-- ===== Operator Surfaces ===== -->
  <rect class="lane" x="790" y="116" width="224" height="524" rx="18" filter="url(#shadow)"/>
  <text class="laneTitle" x="814" y="148">Operator Surfaces</text>

  <rect class="box surface" x="812" y="176" width="180" height="92" rx="13"/>
  <text class="boxText" x="830" y="206">Local Dashboard</text>
  <text class="boxSub" x="830" y="226">single-page system tree</text>
  <text class="boxSub" x="830" y="244">leads · pursuits · setup</text>

  <rect class="box surface" x="812" y="300" width="180" height="92" rx="13"/>
  <text class="boxText" x="830" y="330">MCP Server</text>
  <text class="boxSub" x="830" y="350">technical-contract-research</text>
  <text class="boxSub" x="830" y="368">controlled tool surface</text>

  <rect class="box surface" x="812" y="424" width="180" height="72" rx="13"/>
  <text class="boxText" x="830" y="452">Codex / Claude</text>
  <text class="boxSub" x="830" y="472">AI clients via MCP</text>

  <!-- ===== Outputs ===== -->
  <rect class="lane" x="1042" y="116" width="224" height="524" rx="18" filter="url(#shadow)"/>
  <text class="laneTitle" x="1066" y="148">Outputs</text>

  <rect class="box out" x="1064" y="176" width="180" height="80" rx="13"/>
  <text class="boxText" x="1082" y="204">Daily Digest</text>
  <text class="boxSub" x="1082" y="224">ranked markdown + HTML</text>
  <text class="boxSub" x="1082" y="242">data/digests/</text>

  <rect class="box out" x="1064" y="300" width="180" height="80" rx="13"/>
  <text class="boxText" x="1082" y="328">Pursuit Tracker</text>
  <text class="boxSub" x="1082" y="348">stages: tracking → won</text>
  <text class="boxSub" x="1082" y="366">your fit ratings</text>

  <rect class="box out" x="1064" y="424" width="180" height="80" rx="13"/>
  <text class="boxText" x="1082" y="452">Research Decision</text>
  <text class="boxSub" x="1082" y="472">assess · monitor · reject</text>
  <text class="boxSub" x="1082" y="490">evidence-backed</text>

  <!-- ===== Guidance lane ===== -->
  <rect class="lane" x="286" y="672" width="980" height="104" rx="18" filter="url(#shadow)"/>
  <text class="laneTitle" x="310" y="704">Research Guidance (read by the engine and AI clients)</text>

  <rect class="box guide" x="310" y="720" width="150" height="40" rx="11"/>
  <text class="boxSub" x="328" y="745">PROFILE.md</text>

  <rect class="box guide" x="476" y="720" width="210" height="40" rx="11"/>
  <text class="boxSub" x="494" y="745">criteria/ — fit &amp; exclusion rules</text>

  <rect class="box guide" x="702" y="720" width="180" height="40" rx="11"/>
  <text class="boxSub" x="720" y="745">tasks/ — roadmap spine</text>

  <rect class="box guide" x="898" y="720" width="140" height="40" rx="11"/>
  <text class="boxSub" x="916" y="745">prompts/*.md</text>

  <rect class="box guide" x="1054" y="720" width="180" height="40" rx="11"/>
  <text class="boxSub" x="1072" y="745">adapters/skills/*</text>

  <!-- ===== flow arrows ===== -->
  <path class="arrow" d="M236 380 L308 380"/>
  <path class="arrow" d="M488 380 L560 380"/>
  <path class="arrow" d="M740 380 L812 380"/>
  <path class="arrow" d="M992 380 L1064 380"/>

  <!-- MCP feeds the AI clients -->
  <path class="arrow" d="M902 392 L902 424"/>
  <text class="label" x="916" y="412">tools</text>

  <!-- guidance steers the engine and AI clients -->
  <path class="softArrow" d="M398 672 C398 640 398 626 398 616"/>
  <text class="label" x="300" y="660">profiles steer scoring &amp; rejection</text>
  <path class="softArrow" d="M900 672 C900 600 900 540 900 496"/>
  <text class="small" x="912" y="640">read by Codex / Claude</text>
</svg>
