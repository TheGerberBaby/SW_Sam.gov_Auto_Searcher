name: stormwind-contracts

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.1
    container_name: stormwind-contracts-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.1
    container_name: stormwind-contracts-kibana
    profiles: ["dashboard"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "127.0.0.1:5601:5601"
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: stormwind-contracts-mcp:local
    profiles: ["mcp"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-stormwind_documents_v1}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      USER_TIMEZONE: ${USER_TIMEZONE:-America/New_York}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      # MCP discovery reads contracts.db; publish/watchlist tools intentionally
      # write Workbench state and generated digest reports under data/.
      - ./data:/app/data
    stdin_open: true
    command: ["python", "scripts/mcp_server.py"]

volumes:
  elasticsearch-data:
